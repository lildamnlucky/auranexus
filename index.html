<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraNexus</title>
    <style>
        :root {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --text-primary: #e3e3e3;
            --text-secondary: #c4c7c5;
            --text-dim: #9e9e9e;
            --input-bg: #1e1f20;
            --input-focus: #28292a;
            --border-color: #444746;
            --accent-color: #a855f7;
            --mic-active: #ea4335;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 📋 SIDEBAR NAV PANEL */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .new-chat-btn {
            background: #2b2a2a;
            color: var(--text-primary);
            border: none;
            padding: 12px 16px;
            border-radius: 24px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #333537;
        }

        .sidebar-middle {
            flex: 1;
            margin-top: 24px;
            overflow-y: auto;
        }

        .section-heading {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 12px;
            padding-left: 8px;
        }

        .recent-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .recent-item {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
        }

        .recent-item:hover {
            background: #333537;
        }

        .profile-footer {
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }

        .account-gate input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            box-sizing: border-box;
            font-size: 0.85rem;
        }

        .account-gate input:focus {
            outline: 1px solid var(--accent-color);
        }

        .account-gate button {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* 🤖 CHAT CONSOLE AREA */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            position: relative;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-title {
            font-size: 1.4rem;
            font-weight: 500;
        }

        .brand-title span {
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-left: 8px;
        }

        .status-pill {
            font-size: 0.75rem;
            font-weight: bold;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
            letter-spacing: 0.5px;
        }

        .chat-window {
            flex: 1;
            margin: 40px auto;
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .msg-row {
            display: flex;
            gap: 16px;
        }

        .avatar {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--accent-color);
            min-width: 50px;
        }

        .bubble-text {
            line-height: 1.6;
            font-size: 1.05rem;
            color: var(--text-primary);
        }

        /* ⌨️ INTERACTION BAR */
        .input-wrapper {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            background-color: var(--input-bg);
            border-radius: 28px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid transparent;
        }

        .input-wrapper:focus-within {
            background-color: var(--input-focus);
            border-color: var(--border-color);
        }

        .add-media-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            padding-right: 12px;
        }

        .main-text-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 12px 0;
            font-size: 1rem;
            outline: none;
        }

        .interaction-cluster {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .mic-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s;
        }

        .mic-btn.listening {
            color: var(--mic-active);
            animation: pulse 1.5s infinite;
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn.active {
            color: var(--accent-color);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        /* 📱 TABLET & MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            .sidebar {
                width: 200px;
                padding: 12px;
            }
            .new-chat-btn {
                padding: 10px 14px;
                font-size: 0.85rem;
            }
            .recent-item {
                font-size: 0.8rem;
                padding: 8px 10px;
            }
            .brand-title {
                font-size: 1.2rem;
            }
            .brand-title span, .status-pill {
                display: none;
            }
            .chat-container {
                padding: 16px;
            }
            .bubble-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- 📋 SIDEBAR NAV PANEL -->
    <div class="sidebar">
        <div>
            <button class="new-chat-btn">
                <span>＋</span> New chat
            </button>
        </div>

        <div class="sidebar-middle">
            <div class="section-heading">Recent Conversations</div>
            <div class="recent-list">
                <div class="recent-item">Website for Talent Show</div>
                <div class="recent-item">Game UI Design Concept</div>
                <div class="recent-item">Terminal Config Setup</div>
            </div>
        </div>

        <div class="profile-footer">
            <div class="account-gate">
                <div class="section-heading" style="padding-left:0;">Active Account:</div>
                <p id="user-display" style="margin:0 0 12px 0; font-size:0.9rem; font-weight:600; color:var(--accent-color);">Guest User</p>
                <input type="text" id="api-key-input" placeholder="Enter Gemini API Key...">
                <button onclick="saveApiKey()">Save Token</button>
            </div>
        </div>
    </div>

    <!-- 🤖 CHAT CONSOLE AREA -->
    <div class="chat-container">
        <div class="chat-header">
            <div class="brand-title">AuraNexus <span>Flash 2.5</span></div>
            <div class="status-pill">● SYSTEM ONLINE</div>
        </div>

        <div class="chat-window" id="chat-window">
            <div class="msg-row">
                <div class="avatar">AURA</div>
                <div class="bubble-text">
                    Welcome to AuraNexus Core. Enter your Gemini API Key in the left panel to link your live engine and start launching queries!
                </div>
            </div>
        </div>

        <!-- ⌨️ INTERACTION BAR -->
        <div class="input-wrapper">
            <button class="add-media-btn">＋</button>
            <input type="text" class="main-text-input" id="user-input" placeholder="Ask AuraNexus..." oninput="toggleSendBtn()">
            <div class="interaction-cluster">
                <button class="mic-btn" id="mic-button" onclick="toggleVoiceRecognition()">🎙️</button>
                <button class="send-btn" id="send-button" onclick="sendMessage()">➔</button>
            </div>
        </div>
    </div>

    <script>
        let GEMINI_API_KEY = localStorage.getItem("gemini_api_key") || "";
        let recognition;
        let isListening = false;

        if (GEMINI_API_KEY) {
            document.getElementById("user-display").innerText = "Engine Connected";
            document.getElementById("api-key-input").value = "••••••••••••••••";
        }

        function saveApiKey() {
            const key = document.getElementById("api-key-input").value.trim();
            if (key) {
                localStorage.setItem("gemini_api_key", key);
                GEMINI_API_KEY = key;
                document.getElementById("user-display").innerText = "Engine Connected";
                alert("API Key saved securely to your browser!");
            }
        }

        function toggleSendBtn() {
            const input = document.getElementById("user-input").value.trim();
            const btn = document.getElementById("send-button");
            if (input.length > 0) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        }

        /* 🎙️ LIVE VOICE DICTATION CONFIG */
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = function(event) {
                const speechToText = event.results[0][0].transcript;
                const inputField = document.getElementById("user-input");
                inputField.value = speechToText;
                toggleSendBtn();
                stopListeningMode();
            };

            recognition.onerror = function() {
                stopListeningMode();
            };

            recognition.onend = function() {
                stopListeningMode();
            };
        }

        function toggleVoiceRecognition() {
            if (!recognition) {
                alert("Voice recognition is not fully supported on this browser version.");
                return;
            }
            if (isListening) {
                recognition.stop();
                stopListeningMode();
            } else {
                try {
                    recognition.start();
                    isListening = true;
                    document.getElementById("mic-button").classList.add("listening");
                    document.getElementById("user-input").placeholder = "Listening directly to your voice...";
                } catch (e) {
                    console.error(e);
                }
            }
        }

        function stopListeningMode() {
            isListening = false;
            document.getElementById("mic-button").classList.remove("listening");
            document.getElementById("user-input").placeholder = "Ask AuraNexus...";
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const text = inputField.value.trim();
            if (!text) return;

            if (!GEMINI_API_KEY) {
                alert("Please save your Gemini API key in the sidebar first!");
                return;
            }

            const chatWindow = document.getElementById("chat-window");

            // Append User Message
            const userRow = document.createElement("div");
            userRow.className = "msg-row";
            userRow.innerHTML = `<div class="avatar" style="color:#e3e3e3;">YOU</div><div class="bubble-text">${text}</div>`;
            chatWindow.appendChild(userRow);

            inputField.value = "";
            toggleSendBtn();
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Append Loading AI Placeholder
            const aiRow = document.createElement("div");
            aiRow.className = "msg-row";
            aiRow.innerHTML = `<div class="avatar">AURA</div><div class="bubble-text" id="loading-ai">Thinking...</div>`;
            chatWindow.appendChild(aiRow);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                document.getElementById("loading-ai").innerText = reply;
                document.getElementById("loading-ai").removeAttribute("id");
            } catch (err) {
                document.getElementById("loading-ai").innerText = "Error: Unable to connect to the Gemini engine. Check your API key entry.";
                document.getElementById("loading-ai").removeAttribute("id");
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
