<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraNexus - Sandbox Engine</title>
    <style>
        :root {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --text-primary: #e3e3e3;
            --text-secondary: #c4c7c5;
            --text-dim: #9e9e9e;
            --input-bg: #1e1f20;
            --input-focus: #28292a;
            --border-color: #444746;
            --accent-color: #a855f7;
            --mic-active: #ea4335;
            --sandbox-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 📋 SIDEBAR NAV PANEL */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
            justify-content: space-between;
            flex-shrink: 0;
            border-right: 1px solid var(--border-color);
        }

        .new-chat-btn {
            background: #2b2a2a;
            color: var(--text-primary);
            border: none;
            padding: 12px 16px;
            border-radius: 24px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #333537;
        }

        .sidebar-middle {
            flex: 1;
            margin-top: 24px;
            overflow-y: auto;
        }

        .section-heading {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 12px;
            padding-left: 8px;
        }

        .recent-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .recent-item {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
            transition: background 0.2s;
        }

        .recent-item:hover, .recent-item.active-chat {
            background: #333537;
        }

        .profile-footer {
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .account-gate input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            box-sizing: border-box;
            font-size: 0.85rem;
        }

        .account-gate button {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        /* 主体工作区架构 */
        .workspace-wrapper {
            flex: 1;
            display: flex;
            height: 100%;
            position: relative;
        }

        /* 🤖 CHAT CONSOLE AREA */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            position: relative;
            min-width: 0;
            height: 100%;
            box-sizing: border-box;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-title {
            font-size: 1.4rem;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-pill {
            font-size: 0.75rem;
            font-weight: bold;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
        }

        .sandbox-toggle-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .chat-window {
            flex: 1;
            margin: 20px auto;
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .msg-row {
            display: flex;
            gap: 16px;
        }

        .avatar {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--accent-color);
            min-width: 50px;
        }

        .bubble-text {
            line-height: 1.6;
            font-size: 1.05rem;
            color: var(--text-primary);
            width: 100%;
        }

        .bubble-text img {
            max-width: 250px;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
        }

        /* CODE FORMATTING & BUTTONS */
        pre {
            background: #282a36;
            padding: 14px;
            border-radius: 8px;
            overflow-x: auto;
            position: relative;
            margin: 12px 0;
            border: 1px solid var(--border-color);
        }

        code {
            font-family: "Courier New", Courier, monospace;
            font-size: 0.95rem;
            color: #f8f8f2;
        }

        .sandbox-inject-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(168, 85, 247, 0.8);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
        }

        .sandbox-inject-btn:hover {
            background: var(--accent-color);
        }

        /* 🖼️ IMAGE PREVIEW CONTAINER */
        .preview-wrapper {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            display: none;
            padding: 0 10px 8px 10px;
            box-sizing: border-box;
        }

        .image-preview-box {
            position: relative;
            display: inline-block;
        }

        .image-preview-box img {
            max-height: 80px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .remove-img-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ea4335;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        /* ⌨️ INTERACTION BAR */
        .input-wrapper {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            background-color: var(--input-bg);
            border-radius: 28px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .add-media-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            padding-right: 12px;
        }

        .main-text-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 12px 0;
            font-size: 1rem;
            outline: none;
        }

        .interaction-cluster {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .mic-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .mic-btn.listening {
            color: var(--mic-active);
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .send-btn.active {
            color: var(--accent-color);
        }

        #file-input { display: none; }

        /* 🖥️ LIVE SANDBOX SPLIT WINDOW */
        .sandbox-panel {
            width: 45%;
            height: 100%;
            background-color: var(--sandbox-bg);
            border-left: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            flex-shrink: 0;
        }

        .sandbox-panel.hidden {
            width: 0;
            overflow: hidden;
            border-left: none;
        }

        .sandbox-toolbar {
            background-color: #2b2a2a;
            color: white;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .sandbox-clear-btn {
            background: #ea4335;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .sandbox-iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            background: white;
        }

        @media (max-width: 1024px) {
            .sandbox-panel {
                position: absolute;
                right: 0;
                top: 0;
                z-index: 10;
                width: 80%;
                box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            }
            .sandbox-panel.hidden {
                width: 0;
            }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <button class="new-chat-btn" onclick="createNewChat()">
                <span>＋</span> New chat
            </button>
        </div>

        <div class="sidebar-middle">
            <div class="section-heading">Recent Conversations</div>
            <div class="recent-list" id="recent-list-container"></div>
        </div>

        <div class="profile-footer">
            <div class="account-gate">
                <div class="section-heading" style="padding-left:0;">User Engine Config:</div>
                <input type="text" id="username-input" placeholder="Profile Username...">
                <input type="password" id="api-key-input" placeholder="Gemini API Key...">
                <button onclick="loginProfile()">Connect Account</button>
            </div>
        </div>
    </div>

    <div class="workspace-wrapper">
        
        <!-- MAIN CHAT BOX -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="brand-title" id="display-title">AuraNexus</div>
                <div class="header-actions">
                    <button class="sandbox-toggle-btn" onclick="toggleSandboxPanel()">🛠️ Toggle Sandbox</button>
                    <div class="status-pill">● SYSTEM ONLINE</div>
                </div>
            </div>

            <div class="chat-window" id="chat-window">
                <div class="msg-row">
                    <div class="avatar">AURA</div>
                    <div class="bubble-text">Setup complete. Ask me to design any HTML/CSS component, then tap the "Render Live" button that pops up over the code frame!</div>
                </div>
            </div>

            <!-- Attached Image Preview Shelf -->
            <div class="preview-wrapper" id="preview-shelf">
                <div class="image-preview-box">
                    <img id="img-display-preview" src="">
                    <button class="remove-img-btn" onclick="clearAttachedImage()">×</button>
                </div>
            </div>

            <div class="input-wrapper">
                <button class="add-media-btn" onclick="triggerFileSelect()">＋</button>
                <input type="file" id="file-input" accept="image/*" onchange="handleFileAttachment()">
                <input type="text" class="main-text-input" id="user-input" placeholder="Ask AuraNexus..." oninput="toggleSendBtn()">
                <div class="interaction-cluster">
                    <button class="mic-btn" id="mic-button" onclick="toggleVoiceRecognition()">🎙️</button>
                    <button class="send-btn" id="send-button" onclick="sendMessage()">➔</button>
                </div>
            </div>
        </div>

        <!-- 🖥️ LIVE SANDBOX RUNTIME CANVAS -->
        <div class="sandbox-panel hidden" id="sandbox-panel">
            <div class="sandbox-toolbar">
                <span>🖥️ LIVE RENDER CANVAS</span>
                <button class="sandbox-clear-btn" onclick="clearSandbox()">Clear</button>
            </div>
            <iframe class="sandbox-iframe" id="sandbox-preview"></iframe>
        </div>

    </div>

    <script>
        let currentUsername = "GuestUser";
        let GEMINI_API_KEY = "";
        let chatSessions = {}; 
        let activeSessionId = null;
        let recognition;
        let isListening = false;
        
        let attachedImageBase64 = "";
        let attachedImageMimeType = "";

        window.onload = function() {
            loadGlobalData();
            renderRecentChats();
            startDefaultSession();
            clearSandbox();
        };

        function loadGlobalData() {
            const savedUser = localStorage.getItem("current_username");
            if (savedUser) {
                currentUsername = savedUser;
                document.getElementById("username-input").value = currentUsername;
                document.getElementById("display-title").innerText = `AuraNexus (${currentUsername})`;
            }
            GEMINI_API_KEY = localStorage.getItem(`key_${currentUsername}`) || "";
            if (GEMINI_API_KEY) {
                document.getElementById("api-key-input").value = GEMINI_API_KEY;
            }
            const savedSessions = localStorage.getItem(`sessions_${currentUsername}`);
            chatSessions = savedSessions ? JSON.parse(savedSessions) : {};
        }

        function loginProfile() {
            const userIn = document.getElementById("username-input").value.trim();
            const keyIn = document.getElementById("api-key-input").value.trim();

            if (!userIn) {
                alert("Please declare a username profile.");
                return;
            }

            currentUsername = userIn;
            GEMINI_API_KEY = keyIn;

            localStorage.setItem("current_username", currentUsername);
            localStorage.setItem(`key_${currentUsername}`, GEMINI_API_KEY);

            document.getElementById("display-title").innerText = `AuraNexus (${currentUsername})`;

            const savedSessions = localStorage.getItem(`sessions_${currentUsername}`);
            chatSessions = savedSessions ? JSON.parse(savedSessions) : {};

            renderRecentChats();
            const keys = Object.keys(chatSessions);
            if (keys.length > 0) {
                loadChatSession(keys[0]);
            } else {
                createNewChat();
            }
            alert(`Switched engine to user profile: ${currentUsername}`);
        }

        function renderRecentChats() {
            const container = document.getElementById("recent-list-container");
            container.innerHTML = "";
            
            Object.keys(chatSessions).forEach(id => {
                const item = document.createElement("div");
                item.className = "recent-item";
                if (id === activeSessionId) item.classList.add("active-chat");
                item.innerText = chatSessions[id].title || "Untitled Conversation";
                item.onclick = () => loadChatSession(id);
                container.appendChild(item);
            });
        }

        function startDefaultSession() {
            const keys = Object.keys(chatSessions);
            if (keys.length > 0) {
                loadChatSession(keys[0]);
            } else {
                createNewChat();
            }
        }

        function createNewChat() {
            activeSessionId = "session_" + Date.now();
            chatSessions[activeSessionId] = {
                title: "New Workspace Chat",
                history: []
            };
            saveSessionsToStorage();
            renderRecentChats();
            clearChatWindow();
        }

        function clearChatWindow() {
            const win = document.getElementById("chat-window");
            win.innerHTML = `<div class="msg-row"><div class="avatar">AURA</div><div class="bubble-text">New sandbox console initialized. Ready to generate responses.</div></div>`;
        }

        // Processing Markdown code formatting blocks dynamically
        function formatMarkdownText(rawText) {
            // Regex to capture custom blocks of code
            const codeBlockRegex = /```(?:html|css|javascript|js)?([\s\S]*?)```/g;
            
            return rawText.replace(codeBlockRegex, function(match, codeContent) {
                // Escape simple brackets for inner view rendering
                const escapedCode = codeContent.replace(/</g, "&lt;").replace(/>/g, "&gt;").trim();
                // Create unique data payload identifier for rendering engine
                const structuralData = btoa(unescape(encodeURIComponent(codeContent.trim())));
                
                return `<pre><code>${escapedCode}</code><button class="sandbox-inject-btn" onclick="runInSandbox('${structuralData}')">💻 Render Live</button></pre>`;
            });
        }

        function loadChatSession(id) {
            if (!chatSessions[id]) return;
            activeSessionId = id;
            renderRecentChats();
            
            const win = document.getElementById("chat-window");
            win.innerHTML = "";

            if (chatSessions[id].history.length === 0) {
                clearChatWindow();
                return;
            }

            chatSessions[id].history.forEach(msg => {
                const row = document.createElement("div");
                row.className = "msg-row";
                const imgHTML = msg.imgData ? `<br><img src="data:${msg.imgType};base64,${msg.imgData}">` : "";
                
                if(msg.role === "user") {
                    row.innerHTML = `<div class="avatar" style="color:#e3e3e3;">YOU</div><div class="bubble-text">${msg.text}${imgHTML}</div>`;
                } else {
                    const parsedResponse = formatMarkdownText(msg.text);
                    row.innerHTML = `<div class="avatar">AURA</div><div class="bubble-text">${parsedResponse}</div>`;
                }
                win.appendChild(row);
            });
            win.scrollTop = win.scrollHeight;
        }

        function saveSessionsToStorage() {
            localStorage.setItem(`sessions_${currentUsername}`, JSON.stringify(chatSessions));
        }

        function toggleSendBtn() {
            const input = document.getElementById("user-input").value.trim();
            const btn = document.getElementById("send-button");
            if (input.length > 0 || attachedImageBase64 !== "") btn.classList.add("active");
            else btn.classList.remove("active");
        }

        function triggerFileSelect() {
            document.getElementById("file-input").click();
        }

        function handleFileAttachment() {
            const fileBox = document.getElementById("file-input");
            if (fileBox.files.length === 0) return;

            const file = fileBox.files[0];
            attachedImageMimeType = file.type;

            const reader = new FileReader();
            reader.onload = function(e) {
                const fullResult = e.target.result;
                attachedImageBase64 = fullResult.split(",")[1];
                
                document.getElementById("img-display-preview").src = fullResult;
                document.getElementById("preview-shelf").style.display = "block";
                toggleSendBtn();
            };
            reader.readAsDataURL(file);
        }

        function clearAttachedImage() {
            attachedImageBase64 = "";
            attachedImageMimeType = "";
            document.getElementById("file-input").value = "";
            document.getElementById("preview-shelf").style.display = "none";
            toggleSendBtn();
        }

        /* 🎙️ MIC CONTROLS */
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = function(event) {
                document.getElementById("user-input").value = event.results[0][0].transcript;
                toggleSendBtn();
                stopListeningMode();
            };
            recognition.onerror = () => stopListeningMode();
            recognition.onend = () => stopListeningMode();
        }

        function toggleVoiceRecognition() {
            if (!recognition) {
                alert("Voice architecture not supported.");
                return;
            }
            if (isListening) {
                recognition.stop();
                stopListeningMode();
            } else {
                navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    recognition.start();
                    isListening = true;
                    document.getElementById("mic-button").classList.add("listening");
                })
                .catch(() => alert("Mic check failed. Verify permissions."));
            }
        }

        function stopListeningMode() {
            isListening = false;
            document.getElementById("mic-button").classList.remove("listening");
        }

        /* 🖥️ ENGINE OVERRIDES FOR SANDBOX MOUNTING */
        function toggleSandboxPanel() {
            const panel = document.getElementById("sandbox-panel");
            panel.classList.toggle("hidden");
        }

        function runInSandbox(encodedCode) {
            // Unpack binary data layout string safely
            const dynamicHTML = decodeURIComponent(escape(atob(encodedCode)));
            const iframe = document.getElementById("sandbox-preview");
            
            // Pop canvas drawer open immediately upon rendering click
            document.getElementById("sandbox-panel").classList.remove("hidden");
            
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(dynamicHTML);
            doc.close();
        }

        function clearSandbox() {
            const iframe = document.getElementById("sandbox-preview");
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(`<html><body style="font-family:sans-serif; color:#666; display:flex; justify-content:center; align-items:center; height:90vh;"><div>No code active. Click "Render Live" inside a response block to boot structural preview.</div></body></html>`);
            doc.close();
        }

        /* ➔ SEND INTERACTION CAPTURE */
        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const text = inputField.value.trim();
            
            if (!text && !attachedImageBase64) return;
            if (!GEMINI_API_KEY) {
                alert("Connect your profile and API key first!");
                return;
            }

            const win = document.getElementById("chat-window");

            const userRow = document.createElement("div");
            userRow.className = "msg-row";
            const inlineImgHTML = attachedImageBase64 ? `<br><img src="data:${attachedImageMimeType};base64,${attachedImageBase64}">` : "";
            userRow.innerHTML = `<div class="avatar" style="color:#e3e3e3;">YOU</div><div class="bubble-text">${text}${inlineImgHTML}</div>`;
            win.appendChild(userRow);

            chatSessions[activeSessionId].history.push({ 
                role: "user", 
                text: text,
                imgData: attachedImageBase64,
                imgType: attachedImageMimeType
            });

            if (chatSessions[activeSessionId].title === "New Workspace Chat") {
                chatSessions[activeSessionId].title = text ? text.substring(0, 22) + "..." : "Image Analysis Workspace";
            }

            const currentMsgText = text || "Analyze this code or layout layout image.";
            const savedImageBase64 = attachedImageBase64;
            const savedImageMimeType = attachedImageMimeType;

            clearAttachedImage();
            inputField.value = "";
            toggleSendBtn();
            win.scrollTop = win.scrollHeight;

            const aiRow = document.createElement("div");
            aiRow.className = "msg-row";
            aiRow.innerHTML = `<div class="avatar">AURA</div><div class="bubble-text" id="loader">Processing Request...</div>`;
            win.appendChild(aiRow);
            win.scrollTop = win.scrollHeight;

            let requestParts = [{ text: currentMsgText }];
            if (savedImageBase64) {
                requestParts.push({
                    inlineData: {
                        mimeType: savedImageMimeType,
                        data: savedImageBase64
                    }
                });
            }

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: requestParts }] })
                });

                const data = await res.json();
                const outputText = data.candidates[0].content.parts[0].text;
                
                // Track dynamic parsing changes
                const loaderEl = document.getElementById("loader");
                loaderEl.innerHTML = formatMarkdownText(outputText);
                loaderEl.removeAttribute("id");
                
                chatSessions[activeSessionId].history.push({ role: "model", text: outputText });
            } catch (err) {
                document.getElementById("loader").innerText = "Sandbox Engine API Connection Error.";
                document.getElementById("loader").removeAttribute("id");
            }
            
            saveSessionsToStorage();
            renderRecentChats();
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
