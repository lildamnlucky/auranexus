<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraNexus</title>
    <style>
        :root {
            --bg-main: #131314;
            --bg-sidebar: #1e1f20;
            --text-primary: #e3e3e3;
            --text-secondary: #c4c7c5;
            --text-dim: #9e9e9e;
            --input-bg: #1e1f20;
            --input-focus: #28292a;
            --border-color: #444746;
            --accent-color: #a855f7;
            --mic-active: #ea4335;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* 📋 SIDEBAR NAV PANEL */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .new-chat-btn {
            background: #2b2a2a;
            color: var(--text-primary);
            border: none;
            padding: 12px 16px;
            border-radius: 24px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
            transition: background 0.2s;
        }

        .new-chat-btn:hover {
            background: #333537;
        }

        .sidebar-middle {
            flex: 1;
            margin-top: 24px;
            overflow-y: auto;
        }

        .section-heading {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 12px;
            padding-left: 8px;
        }

        .recent-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .recent-item {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
            transition: background 0.2s;
        }

        .recent-item:hover, .recent-item.active-chat {
            background: #333537;
        }

        .profile-footer {
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .account-gate input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            box-sizing: border-box;
            font-size: 0.85rem;
        }

        .account-gate button {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        /* 🤖 CHAT CONSOLE AREA */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            position: relative;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-title {
            font-size: 1.4rem;
            font-weight: 500;
        }

        .status-pill {
            font-size: 0.75rem;
            font-weight: bold;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 4px 10px;
            border-radius: 12px;
        }

        .chat-window {
            flex: 1;
            margin: 20px auto;
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .msg-row {
            display: flex;
            gap: 16px;
        }

        .avatar {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--accent-color);
            min-width: 50px;
        }

        .bubble-text {
            line-height: 1.6;
            font-size: 1.05rem;
            color: var(--text-primary);
        }

        /* ⌨️ INTERACTION BAR */
        .input-wrapper {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            background-color: var(--input-bg);
            border-radius: 28px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .add-media-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            padding-right: 12px;
        }

        .main-text-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 12px 0;
            font-size: 1rem;
            outline: none;
        }

        .interaction-cluster {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .mic-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .mic-btn.listening {
            color: var(--mic-active);
        }

        .send-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .send-btn.active {
            color: var(--accent-color);
        }

        #file-input { display: none; }

        @media (max-width: 768px) {
            .sidebar { width: 200px; padding: 12px; }
            .brand-title span, .status-pill { display: none; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div>
            <button class="new-chat-btn" onclick="createNewChat()">
                <span>＋</span> New chat
            </button>
        </div>

        <div class="sidebar-middle">
            <div class="section-heading">Recent Conversations</div>
            <div class="recent-list" id="recent-list-container">
                <!-- Dynamically populated via javascript -->
            </div>
        </div>

        <div class="profile-footer">
            <div class="account-gate">
                <div class="section-heading" style="padding-left:0;">User Engine Config:</div>
                <input type="text" id="username-input" placeholder="Profile Username...">
                <input type="password" id="api-key-input" placeholder="Gemini API Key...">
                <button onclick="loginProfile()">Connect Account</button>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="brand-title" id="display-title">AuraNexus</div>
            <div class="status-pill">● SYSTEM ONLINE</div>
        </div>

        <div class="chat-window" id="chat-window">
            <div class="msg-row">
                <div class="avatar">AURA</div>
                <div class="bubble-text">Setup complete. Connect a profile username and API key on the left panel to load saved workspaces.</div>
            </div>
        </div>

        <div class="input-wrapper">
            <button class="add-media-btn" onclick="triggerFileSelect()">＋</button>
            <input type="file" id="file-input" onchange="handleFileAttachment()">
            <input type="text" class="main-text-input" id="user-input" placeholder="Ask AuraNexus..." oninput="toggleSendBtn()">
            <div class="interaction-cluster">
                <button class="mic-btn" id="mic-button" onclick="toggleVoiceRecognition()">🎙️</button>
                <button class="send-btn" id="send-button" onclick="sendMessage()">➔</button>
            </div>
        </div>
    </div>

    <script>
        let currentUsername = "GuestUser";
        let GEMINI_API_KEY = "";
        let chatSessions = {}; 
        let activeSessionId = null;
        let recognition;
        let isListening = false;

        window.onload = function() {
            loadGlobalData();
            renderRecentChats();
            startDefaultSession();
        };

        function loadGlobalData() {
            const savedUser = localStorage.getItem("current_username");
            if (savedUser) {
                currentUsername = savedUser;
                document.getElementById("username-input").value = currentUsername;
                document.getElementById("display-title").innerText = `AuraNexus (${currentUsername})`;
            }
            GEMINI_API_KEY = localStorage.getItem(`key_${currentUsername}`) || "";
            if (GEMINI_API_KEY) {
                document.getElementById("api-key-input").value = GEMINI_API_KEY;
            }
            const savedSessions = localStorage.getItem(`sessions_${currentUsername}`);
            chatSessions = savedSessions ? JSON.parse(savedSessions) : {};
        }

        function loginProfile() {
            const userIn = document.getElementById("username-input").value.trim();
            const keyIn = document.getElementById("api-key-input").value.trim();

            if (!userIn) {
                alert("Please declare a username profile.");
                return;
            }

            currentUsername = userIn;
            GEMINI_API_KEY = keyIn;

            localStorage.setItem("current_username", currentUsername);
            localStorage.setItem(`key_${currentUsername}`, GEMINI_API_KEY);

            document.getElementById("display-title").innerText = `AuraNexus (${currentUsername})`;

            const savedSessions = localStorage.getItem(`sessions_${currentUsername}`);
            chatSessions = savedSessions ? JSON.parse(savedSessions) : {};

            renderRecentChats();
            const keys = Object.keys(chatSessions);
            if (keys.length > 0) {
                loadChatSession(keys[0]);
            } else {
                createNewChat();
            }
            alert(`Switched engine to user profile: ${currentUsername}`);
        }

        function renderRecentChats() {
            const container = document.getElementById("recent-list-container");
            container.innerHTML = "";
            
            Object.keys(chatSessions).forEach(id => {
                const item = document.createElement("div");
                item.className = "recent-item";
                if (id === activeSessionId) item.classList.add("active-chat");
                item.innerText = chatSessions[id].title || "Untitled Conversation";
                item.onclick = () => loadChatSession(id);
                container.appendChild(item);
            });
        }

        function startDefaultSession() {
            const keys = Object.keys(chatSessions);
            if (keys.length > 0) {
                loadChatSession(keys[0]);
            } else {
                createNewChat();
            }
        }

        function createNewChat() {
            activeSessionId = "session_" + Date.now();
            chatSessions[activeSessionId] = {
                title: "New Workspace Chat",
                history: []
            };
            saveSessionsToStorage();
            renderRecentChats();
            clearChatWindow();
        }

        function clearChatWindow() {
            const win = document.getElementById("chat-window");
            win.innerHTML = `<div class="msg-row"><div class="avatar">AURA</div><div class="bubble-text">New sandbox console initialized. Ready to generate responses.</div></div>`;
        }

        function loadChatSession(id) {
            if (!chatSessions[id]) return;
            activeSessionId = id;
            renderRecentChats();
            
            const win = document.getElementById("chat-window");
            win.innerHTML = "";

            if (chatSessions[id].history.length === 0) {
                clearChatWindow();
                return;
            }

            chatSessions[id].history.forEach(msg => {
                const row = document.createElement("div");
                row.className = "msg-row";
                if(msg.role === "user") {
                    row.innerHTML = `<div class="avatar" style="color:#e3e3e3;">YOU</div><div class="bubble-text">${msg.text}</div>`;
                } else {
                    row.innerHTML = `<div class="avatar">AURA</div><div class="bubble-text">${msg.text}</div>`;
                }
                win.appendChild(row);
            });
            win.scrollTop = win.scrollHeight;
        }

        function saveSessionsToStorage() {
            localStorage.setItem(`sessions_${currentUsername}`, JSON.stringify(chatSessions));
        }

        function toggleSendBtn() {
            const input = document.getElementById("user-input").value.trim();
            const btn = document.getElementById("send-button");
            if (input.length > 0) btn.classList.add("active");
            else btn.classList.remove("active");
        }

        function triggerFileSelect() {
            document.getElementById("file-input").click();
        }

        function handleFileAttachment() {
            const fileBox = document.getElementById("file-input");
            if (fileBox.files.length > 0) {
                alert(`File selected: ${fileBox.files[0].name}. (Upgraded engine attachment ready)`);
            }
        }

        /* 🎙️ MOBILE & DESKTOP MIC SUPPORT */
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = function(event) {
                const text = event.results[0][0].transcript;
                document.getElementById("user-input").value = text;
                toggleSendBtn();
                stopListeningMode();
            };
            recognition.onerror = () => stopListeningMode();
            recognition.onend = () => stopListeningMode();
        }

        function toggleVoiceRecognition() {
            if (!recognition) {
                alert("Voice configuration is not supported on this device browser architecture.");
                return;
            }
            if (isListening) {
                recognition.stop();
                stopListeningMode();
            } else {
                // Request permissions directly
                navigator.mediaDevices.getUserMedia({ audio: true })
                .then(() => {
                    recognition.start();
                    isListening = true;
                    document.getElementById("mic-button").classList.add("listening");
                    document.getElementById("user-input").placeholder = "Listening directly...";
                })
                .catch(err => alert("Microphone access was denied by your Android device systems. Check permissions."));
            }
        }

        function stopListeningMode() {
            isListening = false;
            document.getElementById("mic-button").classList.remove("listening");
            document.getElementById("user-input").placeholder = "Ask AuraNexus...";
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const text = inputField.value.trim();
            if (!text) return;

            if (!GEMINI_API_KEY) {
                alert("Please add your Gemini API Key first!");
                return;
            }

            const win = document.getElementById("chat-window");

            // Display user message
            const userRow = document.createElement("div");
            userRow.className = "msg-row";
            userRow.innerHTML = `<div class="avatar" style="color:#e3e3e3;">YOU</div><div class="bubble-text">${text}</div>`;
            win.appendChild(userRow);

            // Save conversation state 
            chatSessions[activeSessionId].history.push({ role: "user", text: text });
            if (chatSessions[activeSessionId].title === "New Workspace Chat") {
                chatSessions[activeSessionId].title = text.substring(0, 22) + "...";
            }

            inputField.value = "";
            toggleSendBtn();
            win.scrollTop = win.scrollHeight;

            const aiRow = document.createElement("div");
            aiRow.className = "msg-row";
            aiRow.innerHTML = `<div class="avatar">AURA</div><div class="bubble-text" id="loader">Processing request...</div>`;
            win.appendChild(aiRow);
            win.scrollTop = win.scrollHeight;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await res.json();
                const outputText = data.candidates[0].content.parts[0].text;
                
                document.getElementById("loader").innerText = outputText;
                document.getElementById("loader").removeAttribute("id");
                
                chatSessions[activeSessionId].history.push({ role: "model", text: outputText });
            } catch (err) {
                document.getElementById("loader").innerText = "Connection Error: Check key syntax settings.";
                document.getElementById("loader").removeAttribute("id");
            }
            
            saveSessionsToStorage();
            renderRecentChats();
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
</html>
