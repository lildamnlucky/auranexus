<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Console</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --bg-main: #131314;
            --bg-sidebar: rgba(30, 31, 32, 0.85);
            --text-primary: #e3e3e3;
            --text-secondary: #c4c7c5;
            --text-dim: #9e9e9e;
            --input-bg: rgba(30, 31, 32, 0.8);
            --input-focus: rgba(40, 41, 42, 0.95);
            --border-color: #444746;
            --accent-color: #a855f7;
            --mic-active: #ea4335;
            --sandbox-bg: #ffffff;
            --overlay-panel: rgba(19, 19, 20, 0.75);
        }

        /* 🎨 THEME PRESETS */
        body.theme-amber {
            --bg-main: #0c0702;
            --bg-sidebar: rgba(22, 14, 5, 0.85);
            --text-primary: #ffb041;
            --text-secondary: #e0962f;
            --text-dim: #a66f22;
            --input-bg: rgba(27, 17, 7, 0.8);
            --input-focus: rgba(38, 24, 11, 0.95);
            --border-color: #ffb041;
            --accent-color: #ff9100;
            --overlay-panel: rgba(12, 7, 2, 0.75);
        }

        body.theme-matrix {
            --bg-main: #030704;
            --bg-sidebar: rgba(9, 17, 10, 0.85);
            --text-primary: #39ff14;
            --text-secondary: #26cc0f;
            --text-dim: #1a8c0a;
            --input-bg: rgba(13, 26, 16, 0.8);
            --input-focus: rgba(20, 38, 23, 0.95);
            --border-color: #39ff14;
            --accent-color: #00ff66;
            --overlay-panel: rgba(3, 7, 4, 0.75);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.2s, color 0.2s;
            position: relative;
        }

        /* 🌌 3D BACKDROP CANVAS */
        #three-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.85;
        }

        /* */
        .sidebar {
            width: 280px;
            background-color: var(--bg-sidebar);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            padding: 16px;
            box-sizing: border-box;
            justify-content: space-between;
            flex-shrink: 0;
            border-right: 1px solid var(--border-color);
            z-index: 2;
            transition: background 0.2s;
        }

        .new-chat-btn {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 24px;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: fit-content;
        }

        .sidebar-middle {
            flex: 1;
            margin-top: 24px;
            overflow-y: auto;
        }

        .section-heading {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 12px;
            padding-left: 8px;
        }

        .recent-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .recent-item {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
        }

        .recent-item:hover, .recent-item.active-chat {
            background: rgba(255,255,255,0.05);
            border-left: 2px solid var(--accent-color);
        }

        .xp-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 4px;
        }

        .xp-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .xp-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            background: var(--accent-color);
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 8px var(--accent-color);
        }

        .profile-footer {
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .account-gate input {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            box-sizing: border-box;
            font-size: 0.85rem;
        }

        .account-gate button {
            width: 100%;
            background: var(--accent-color);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 8px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .theme-selector-deck {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 8px;
        }

        .theme-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
        }

        .theme-dot:hover { transform: scale(1.2); }
        .theme-dot.active { border-color: var(--text-primary); }
        .dot-purple { background: #a855f7; }
        .dot-amber { background: #ff9100; }
        .dot-matrix { background: #39ff14; }

        .workspace-wrapper {
            flex: 1;
            display: flex;
            height: 100%;
            position: relative;
            z-index: 1;
        }

        /* */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
            position: relative;
            min-width: 0;
            height: 100%;
            box-sizing: border-box;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--overlay-panel);
            padding: 12px 20px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .brand-title {
            font-size: 1.4rem;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        #hud-visualizer {
            width: 110px;
            height: 28px;
            background: transparent;
            border-radius: 6px;
        }

        .status-pill {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--accent-color);
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 12px;
            font-family: monospace;
        }

        .sandbox-toggle-btn {
            background: none;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .chat-window {
            flex: 1;
            margin: 20px auto;
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .msg-row {
            display: flex;
            gap: 16px;
            background: var(--overlay-panel);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }

        .avatar {
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--accent-color);
            min-width: 50px;
            font-family: monospace;
        }

        .bubble-text {
            line-height: 1.6;
            font-size: 1.05rem;
            color: var(--text-primary);
            width: 100%;
        }

        .bubble-text img {
            max-width: 250px;
            border-radius: 8px;
            margin-top: 8px;
            display: block;
        }

        pre {
            background: rgba(0,0,0,0.4);
            padding: 14px;
            border-radius: 8px;
            overflow-x: auto;
            position: relative;
            margin: 12px 0;
            border: 1px solid var(--border-color);
        }

        code {
            font-family: monospace;
            font-size: 0.95rem;
        }

        .code-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 6px;
        }

        .sandbox-inject-btn, .copy-code-btn {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .sandbox-inject-btn:hover { transform: scale(1.05); }

        .copy-code-btn {
            background: rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .copy-code-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .msg-actions {
            margin-top: 8px;
            display: flex;
            gap: 12px;
        }

        .action-icon-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 0.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 6px;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .action-icon-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-color);
        }

        .preview-wrapper {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            display: none;
            padding: 0 10px 8px 10px;
            box-sizing: border-box;
        }

        .image-preview-box {
            position: relative;
            display: inline-block;
        }

        .image-preview-box img {
            max-height: 80px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .remove-img-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            background: #ea4335;
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* */
        .input-wrapper {
            width: 100%;
            max-width: 720px;
            margin: 0 auto;
            background-color: var(--input-bg);
            border-radius: 28px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .add-media-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            padding-right: 12px;
        }

        .main-text-input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-primary);
            padding: 12px 0;
            font-size: 1rem;
            outline: none;
        }

        .interaction-cluster {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .mic-btn, .send-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2rem;
            cursor: pointer;
        }

        .mic-btn.listening, .send-btn.active {
            color: var(--accent-color);
        }

        #file-input { display: none; }

        .sandbox-panel {
            width: 45%;
            height: 100%;
            background-color: var(--sandbox-bg);
            border-left: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            flex-shrink: 0;
        }

        .sandbox-panel.hidden { width: 0; overflow: hidden; border-left: none; }

        .sandbox-toolbar {
            background-color: var(--bg-sidebar);
            color: var(--text-primary);
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border-color);
        }

        .sandbox-clear-btn {
            background: #ea4335;
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .sandbox-iframe { flex: 1; border: none; width: 100%; height: 100%; background: white; }

        .toast-banner {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg-sidebar);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s;
            opacity: 0;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast-banner.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast-banner .toast-accent {
            color: var(--accent-color);
            font-weight: bold;
        }

        @media (max-width: 1024px) {
            .sandbox-panel { position: absolute; right: 0; top: 0; z-index: 10; width: 80%; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
            .sandbox-panel.hidden { width: 0; }
        }
        @media (max-width: 768px) {
            .sidebar { width: 220px; }
            .brand-title { font-size: 1.1rem; }
            #hud-visualizer { width: 70px; }
        }
    </style>
</head>
<body>

    <!-- 🌌 INTERACTIVE BACKGROUND MATRIX -->
    <canvas id="three-bg"></canvas>

    <!-- 🔔 FLOATING TOAST NOTIFICATION SYSTEM -->
    <div id="toast" class="toast-banner">
        <span class="toast-accent">System:</span> <span id="toast-message">Notification loaded successfully.</span>
    </div>

    <div class="sidebar">
        <div>
            <button class="new-chat-btn" onclick="createNewChat()">
                <span>＋</span> New chat
            </button>
        </div>

        <div class="sidebar-middle">
            <div class="section-heading">Recent Conversations</div>
            <div class="recent-list" id="recent-list-container"></div>
        </div>

        <div class="profile-footer">
            
            <!-- 🎮 RPG LEVEL & XP SYSTEMS PROFILE CARD -->
            <div class="xp-card">
                <div class="xp-header">
                    <span id="xp-rank" style="color: var(--accent-color);">Lvl 1: Novice Prompter</span>
                    <span id="xp-value" style="color: var(--text-dim);">0 / 100 XP</span>
                </div>
                <div class="xp-bar-container">
                    <div id="xp-bar" class="xp-bar-fill"></div>
                </div>
            </div>

            <div class="account-gate">
                <div class="section-heading" style="padding-left:0;">User Engine Config:</div>
                <input type="text" id="username-input" placeholder="Profile Username...">
                <input type="password" id="api-key-input" placeholder="Gemini API Key...">
                <button onclick="loginProfile()">Connect Account</button>
            </div>
            
            <!-- THEME SWITCHER -->
            <div style="margin-top: 8px;">
                <div class="section-heading" style="padding-left:0; margin-bottom: 6px;">Matrix Core Theme:</div>
                <div class="theme-selector-deck">
                    <div class="theme-dot dot-purple active" onclick="switchTheme('default')"></div>
                    <div class="theme-dot dot-amber" onclick="switchTheme('amber')"></div>
                    <div class="theme-dot dot-matrix" onclick="switchTheme('matrix')"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="workspace-wrapper">
        
        <div class="chat-container">
            <div class="chat-header">
                <div class="brand-title" id="display-title">Console</div>
                <div class="header-actions">
                    <button class="sandbox-toggle-btn" onclick="toggleSandboxPanel()">🛠️ Toggle Sandbox</button>
                    
                    <!-- 🌌 HOLOGRAPHIC AUDIO STATE CANVAS -->
                    <canvas id="hud-visualizer"></canvas>

                    <div class="status-pill" id="status-clock">● SYSTEM ONLINE</div>
                </div>
            </div>

            <div class="chat-window" id="chat-window">
                <div class="msg-row">
                    <div class="avatar">SYSTEM</div>
                    <div class="bubble-text">System operational. Ready to test interface components.</div>
                </div>
            </div>

            <div class="preview-wrapper" id="preview-shelf">
                <div class="image-preview-box">
                    <img id="img-display-preview" src="">
                    <button class="remove-img-btn" onclick="clearAttachedImage()">×</button>
                </div>
            </div>

            <div class="input-wrapper">
                <button class="add-media-btn" onclick="triggerFileSelect()">＋</button>
                <input type="file" id="file-input" accept="image/*" onchange="handleFileAttachment()">
                <!-- Satisfying audio sync linked on input trigger events -->
                <input type="text" class="main-text-input" id="user-input" placeholder="Type a message..." oninput="handleTextInput(this)">
                <div class="interaction-cluster">
                    <button class="mic-btn" id="mic-button" onclick="toggleVoiceRecognition()">🎙️</button>
                    <button class="send-btn" id="send-button" onclick="sendMessage()">➔</button>
                </div>
            </div>
        </div>

        <div class="sandbox-panel hidden" id="sandbox-panel">
            <div class="sandbox-toolbar">
                <span>🖥️ LIVE RENDER CANVAS</span>
                <button class="sandbox-clear-btn" onclick="clearSandbox()">Clear</button>
            </div>
            <iframe class="sandbox-iframe" id="sandbox-preview"></iframe>
        </div>

    </div>

    <script>
        let currentUsername = "GuestUser";
        let GEMINI_API_KEY = "";
        let chatSessions = {}; 
        let activeSessionId = null;
        let recognition;
        let isListening = false;
        
        let attachedImageBase64 = "";
        let attachedImageMimeType = "";

        let currentUtterance = null;

        // RPG Leveling Stats
        let userXP = 0;
        let userLevel = 1;

        // Holographic visualizer States
        let visualizerCanvas, visualizerCtx;
        let visualizerState = "idle"; // idle, computing, listening, speaking
        let animationFrameId;
        let phase = 0;

        // Sound FX Settings
        let audioCtx = null;

        // 3D Three.js space elements
        let scene, camera, renderer, particles;
        let targetRotationX = 0, targetRotationY = 0;
        let currentRotationX = 0, currentRotationY = 0;

        window.onload = function() {
            loadGlobalData();
            renderRecentChats();
            startDefaultSession();
            clearSandbox();
            
            const activeTheme = localStorage.getItem("auranexus_theme") || "default";
            switchTheme(activeTheme);

            initVisualizer();
            init3DSpace();
        };

        function initAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Synthesizes a futuristic, soft sci-fi keyboard click on demand
        function playKeyboardSound() {
            try {
                initAudioContext();
                if (!audioCtx) return;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                // Quick satisfying sound envelope
                osc.type = "sine";
                const now = audioCtx.currentTime;
                osc.frequency.setValueAtTime(800 + Math.random() * 200, now);
                osc.frequency.exponentialRampToValueAtTime(150, now + 0.04);

                gain.gain.setValueAtTime(0.04, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);

                osc.start(now);
                osc.stop(now + 0.05);
            } catch (e) {
                // Audio synthesis bypassed if browser blocks initial focus
            }
        }

        function handleTextInput(element) {
            playKeyboardSound();
            toggleSendBtn();
        }

        function init3DSpace() {
            const canvas = document.getElementById("three-bg");
            if (!canvas) return;

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.z = 250;

            renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Generate Drifting Space Particles
            const particleCount = 450;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 600;     // X coordinate
                positions[i + 1] = (Math.random() - 0.5) * 600; // Y coordinate
                positions[i + 2] = (Math.random() - 0.5) * 500; // Z coordinate
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

            // Get Current Theme Accent Color
            const accentColorStr = getComputedStyle(document.body).getPropertyValue('--accent-color').trim() || '#a855f7';
            
            // Build Circular Particle Texture dynamically
            const pMaterial = new THREE.PointsMaterial({
                color: new THREE.Color(accentColorStr),
                size: 3.5,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, pMaterial);
            scene.add(particles);

            // Add subtle responsive grid
            const gridHelper = new THREE.GridHelper(500, 30, accentColorStr, accentColorStr);
            gridHelper.position.y = -180;
            gridHelper.material.opacity = 0.15;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // Touch & Mouse Attractor Listener bindings
            window.addEventListener('mousemove', handleInteractionMovement);
            window.addEventListener('touchmove', handleInteractionTouch);
            window.addEventListener('resize', onWindowResize);

            animate3DSpace();
        }

        function handleInteractionMovement(event) {
            targetRotationY = (event.clientX / window.innerWidth - 0.5) * 0.4;
            targetRotationX = (event.clientY / window.innerHeight - 0.5) * 0.4;
        }

        function handleInteractionTouch(event) {
            if (event.touches.length > 0) {
                targetRotationY = (event.touches[0].clientX / window.innerWidth - 0.5) * 0.5;
                targetRotationX = (event.touches[0].clientY / window.innerHeight - 0.5) * 0.5;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeVisualizerCanvas();
        }

        function animate3DSpace() {
            requestAnimationFrame(animate3DSpace);

            // Drifting orbit animations
            if (particles) {
                particles.rotation.y += 0.0006;
                particles.rotation.x += 0.0002;

                // Ease rotation towards touch tracking target
                currentRotationY += (targetRotationY - currentRotationY) * 0.05;
                currentRotationX += (targetRotationX - currentRotationX) * 0.05;

                particles.rotation.y += currentRotationY * 0.1;
                particles.rotation.x += currentRotationX * 0.1;
            }

            renderer.render(scene, camera);
        }

        function initVisualizer() {
            visualizerCanvas = document.getElementById("hud-visualizer");
            if (!visualizerCanvas) return;
            visualizerCtx = visualizerCanvas.getContext("2d");
            resizeVisualizerCanvas();
            window.addEventListener('resize', resizeVisualizerCanvas);
            animateVisualizer();
        }

        function resizeVisualizerCanvas() {
            if (!visualizerCanvas) return;
            const rect = visualizerCanvas.getBoundingClientRect();
            visualizerCanvas.width = rect.width * window.devicePixelRatio;
            visualizerCanvas.height = rect.height * window.devicePixelRatio;
            visualizerCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        function hexToRGBA(hex, alpha) {
            hex = hex.replace('#', '');
            if (hex.length === 3) {
                hex = hex.split('').map(char => char + char).join('');
            }
            if (hex === "a855f7" || hex.includes("a855f7")) return `rgba(168, 85, 247, ${alpha})`;
            if (hex === "ff9100" || hex.includes("ff9100")) return `rgba(255, 145, 0, ${alpha})`;
            if (hex === "00ff66" || hex.includes("00ff66")) return `rgba(0, 255, 102, ${alpha})`;
            
            const r = parseInt(hex.substring(0, 2), 16) || 168;
            const g = parseInt(hex.substring(2, 4), 16) || 85;
            const b = parseInt(hex.substring(4, 6), 16) || 247;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function animateVisualizer() {
            if (!visualizerCanvas || !visualizerCtx) return;
            visualizerCtx.clearRect(0, 0, visualizerCanvas.clientWidth, visualizerCanvas.clientHeight);

            const accentColor = getComputedStyle(document.body).getPropertyValue('--accent-color').trim() || '#a855f7';
            visualizerCtx.lineWidth = 1.5;
            visualizerCtx.shadowColor = accentColor;
            visualizerCtx.shadowBlur = 4;

            const width = visualizerCanvas.clientWidth;
            const height = visualizerCanvas.clientHeight;
            const midY = height / 2;

            phase += 0.15;

            let numWaves = 1;
            let amplitudeMultiplier = 1;
            let frequencyMultiplier = 1;

            if (visualizerState === "computing") {
                numWaves = 3;
                amplitudeMultiplier = 1.2;
                frequencyMultiplier = 3.0;
                phase += 0.08; 
            } else if (visualizerState === "listening") {
                numWaves = 2;
                amplitudeMultiplier = 1.7;
                frequencyMultiplier = 1.4;
            } else if (visualizerState === "speaking") {
                numWaves = 2;
                amplitudeMultiplier = 1.3;
                frequencyMultiplier = 0.9;
            } else { // idle
                numWaves = 1;
                amplitudeMultiplier = 0.25;
                frequencyMultiplier = 0.6;
                visualizerCtx.shadowBlur = 1;
            }

            for (let w = 0; w < numWaves; w++) {
                visualizerCtx.beginPath();
                const offset = w * Math.PI / 1.8;
                const amp = (height / 2.6) * amplitudeMultiplier * (w === 0 ? 1 : 0.4);

                for (let x = 0; x <= width; x++) {
                    const progress = x / width;
                    const edgeMask = Math.sin(progress * Math.PI); // Pin visual boundaries
                    const y = midY + Math.sin(progress * Math.PI * 2 * frequencyMultiplier + phase + offset) * amp * edgeMask;

                    if (x === 0) visualizerCtx.moveTo(x, y);
                    else visualizerCtx.lineTo(x, y);
                }
                visualizerCtx.strokeStyle = w === 0 ? accentColor : hexToRGBA(accentColor, 0.35);
                visualizerCtx.stroke();
            }

            animationFrameId = requestAnimationFrame(animateVisualizer);
        }

        function triggerToast(message) {
            const toast = document.getElementById("toast");
            const toastMsg = document.getElementById("toast-message");
            toastMsg.innerText = message;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        function switchTheme(themeName) {
            document.body.className = ""; // Wipe active classes
            document.querySelectorAll(".theme-dot").forEach(dot => dot.classList.remove("active"));
            
            if (themeName === "amber") {
                document.body.classList.add("theme-amber");
                document.querySelector(".dot-amber").classList.add("active");
            } else if (themeName === "matrix") {
                document.body.classList.add("theme-matrix");
                document.querySelector(".dot-matrix").classList.add("active");
            } else {
                document.querySelector(".dot-purple").classList.add("active");
            }
            localStorage.setItem("auranexus_theme", themeName);

            // Dynamically update existing 3D particles to match the selected system color
            if (particles) {
                const accentColorStr = getComputedStyle(document.body).getPropertyValue('--accent-color').trim() || '#a855f7';
                particles.material.color.set(accentColorStr);
            }
        }

        function loadGlobalData() {
            try {
                const savedUser = localStorage.getItem("current_username");
                if (savedUser) {
                    currentUsername = savedUser;
                    document.getElementById("username-input").value = currentUsername;
                    document.getElementById("display-title").innerText = currentUsername;
                }
                GEMINI_API_KEY = localStorage.getItem(`key_${currentUsername}`) || "";
                if (GEMINI_API_KEY) document.getElementById("api-key-input").value = GEMINI_API_KEY;
                
                const savedSessions = localStorage.getItem(`sessions_${currentUsername}`);
                chatSessions = savedSessions ? JSON.parse(savedSessions) : {};

                // Load RPG leveling records
                userXP = parseInt(localStorage.getItem(`xp_${currentUsername}`)) || 0;
                userLevel = parseInt(localStorage.getItem(`level_${currentUsername}`)) || 1;
                updateXPDisplay();
            } catch (err) {
                console.error("Local Storage sync recovery.", err);
                chatSessions = {};
            }
        }

        function getLevelTitle(level) {
            const titles = [
                "Novice Prompter",
                "Script Initiate",
                "Byte Weaver",
                "Layout Squire",
                "Code Cyber-Ninja",
                "Terminal Architect"
            ];
            return titles[Math.min(level - 1, titles.length - 1)];
        }

        function updateXPDisplay() {
            const nextLevelXP = userLevel * 100;
            document.getElementById("xp-rank").innerText = `Lvl ${userLevel}: ${getLevelTitle(userLevel)}`;
            document.getElementById("xp-value").innerText = `${userXP} / ${nextLevelXP} XP`;
            const percentage = Math.min((userXP / nextLevelXP) * 100, 100);
            document.getElementById("xp-bar").style.width = `${percentage}%`;
        }

        function addXP(amount) {
            userXP += amount;
            let nextLevelXP = userLevel * 100;
            let leveledUp = false;
            
            while (userXP >= nextLevelXP) {
                userXP -= nextLevelXP;
                userLevel++;
                nextLevelXP = userLevel * 100;
                leveledUp = true;
            }
            
            localStorage.setItem(`xp_${currentUsername}`, userXP);
            localStorage.setItem(`level_${currentUsername}`, userLevel);
            updateXPDisplay();

            if (leveledUp) {
                triggerToast(`🎉 LEVEL UP! You are now a Lvl ${userLevel} ${getLevelTitle(userLevel)}!`);
            } else {
                triggerToast(`✨ Gained +${amount} XP!`);
            }
        }

        function loginProfile() {
            const userIn = document.getElementById("username-input").value.trim();
            const keyIn = document.getElementById("api-key-input").value.trim();
            
            if (!userIn) {
                triggerToast("Please input a valid username.");
                return;
            }

            currentUsername = userIn;
            GEMINI_API_KEY = keyIn;
            localStorage.setItem("current_username", currentUsername);
            localStorage.setItem(`key_${currentUsername}`, GEMINI_API_KEY);
            document.getElementById("display-title").innerText = currentUsername;

            try {
                const savedSessions = localStorage.getItem(`sessions_${currentUsername}`);
                chatSessions = savedSessions ? JSON.parse(savedSessions) : {};
                
                userXP = parseInt(localStorage.getItem(`xp_${currentUsername}`)) || 0;
                userLevel = parseInt(localStorage.getItem(`level_${currentUsername}`)) || 1;
                updateXPDisplay();
            } catch(e) {
                chatSessions = {};
            }

            renderRecentChats();
            startDefaultSession();
            triggerToast(`Profile Synchronized: ${currentUsername}`);
        }

        function renderRecentChats() {
            const container = document.getElementById("recent-list-container");
            container.innerHTML = "";
            Object.keys(chatSessions).forEach(id => {
                const item = document.createElement("div");
                item.className = "recent-item";
                if (id === activeSessionId) item.classList.add("active-chat");
                item.innerText = chatSessions[id].title || "Untitled Conversation";
                item.onclick = () => loadChatSession(id);
                container.appendChild(item);
            });
        }

        function startDefaultSession() {
            const keys = Object.keys(chatSessions);
            if (keys.length > 0) loadChatSession(keys[0]);
            else createNewChat();
        }

        function createNewChat() {
            activeSessionId = "session_" + Date.now();
            chatSessions[activeSessionId] = { title: "New Workspace Chat", history: [] };
            saveSessionsToStorage();
            renderRecentChats();
            clearChatWindow();
        }

        function clearChatWindow() {
            document.getElementById("chat-window").innerHTML = `<div class="msg-row"><div class="avatar">SYSTEM</div><div class="bubble-text">New sandbox console initialized. Ready to generate responses.</div></div>`;
        }

        function formatMarkdownText(rawText) {
            const codeBlockRegex = /```(?:html|css|javascript|js)?([\s\S]*?)```/g;
            return rawText.replace(codeBlockRegex, function(match, codeContent) {
                const escapedCode = codeContent.replace(/</g, "&lt;").replace(/>/g, "&gt;").trim();
                const structuralData = btoa(unescape(encodeURIComponent(codeContent.trim())));
                return `<pre><code>${escapedCode}</code><div class="code-actions"><button class="sandbox-inject-btn" onclick="runInSandbox('${structuralData}')">💻 Render Live</button><button class="copy-code-btn" onclick="copyToClipboard('${structuralData}')">📋 Copy Code</button></div></pre>`;
            });
        }

        function copyToClipboard(encodedCode) {
            const dynamicHTML = decodeURIComponent(escape(atob(encodedCode)));
            const textarea = document.createElement("textarea");
            textarea.value = dynamicHTML;
            textarea.style.position = "fixed";
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                triggerToast("Layout code copied to clipboard!");
            } catch (err) {
                triggerToast("Copy action unsupported on this device.");
            }
            document.body.removeChild(textarea);
        }

        function speakMessage(sessionId, msgIndex) {
            const session = chatSessions[sessionId];
            if (!session || !session.history[msgIndex]) return;
            const rawText = session.history[msgIndex].text;

            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
                visualizerState = "idle";
                if (currentUtterance && currentUtterance.sessionId === sessionId && currentUtterance.msgIndex === msgIndex) {
                    currentUtterance = null;
                    return;
                }
            }

            const cleanSpokenText = rawText.replace(/```[\s\S]*?```/g, "[Skipping code block]").replace(/<[^>]*>/g, "");
            
            const utterance = new SpeechSynthesisUtterance(cleanSpokenText);
            utterance.sessionId = sessionId;
            utterance.msgIndex = msgIndex;
            currentUtterance = utterance;

            utterance.onstart = () => { visualizerState = "speaking"; };
            utterance.onend = () => { visualizerState = "idle"; currentUtterance = null; };
            utterance.onerror = () => { visualizerState = "idle"; currentUtterance = null; };

            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes("Google US English") || v.name.includes("Natural"));
            if (preferredVoice) utterance.voice = preferredVoice;

            window.speechSynthesis.speak(utterance);
        }

        function loadChatSession(id) {
            if (!chatSessions[id]) return;
            activeSessionId = id;
            renderRecentChats();
            const win = document.getElementById("chat-window");
            win.innerHTML = "";
            if (chatSessions[id].history.length === 0) return clearChatWindow();

            chatSessions[id].history.forEach((msg, index) => {
                const row = document.createElement("div");
                row.className = "msg-row";
                const imgHTML = msg.imgData ? `<br><img src="data:${msg.imgType};base64,${msg.imgData}">` : "";
                if(msg.role === "user") {
                    row.innerHTML = `<div class="avatar" style="color:var(--text-primary);">YOU</div><div class="bubble-text">${msg.text}${imgHTML}</div>`;
                } else {
                    row.innerHTML = `
                        <div class="avatar">SYSTEM</div>
                        <div class="bubble-text">
                            ${formatMarkdownText(msg.text)}
                            <div class="msg-actions">
                                <button class="action-icon-btn" onclick="speakMessage('${id}', ${index})">🔊 Listen</button>
                            </div>
                        </div>`;
                }
                win.appendChild(row);
            });
            win.scrollTop = win.scrollHeight;
        }

        function saveSessionsToStorage() { 
            try {
                localStorage.setItem(`sessions_${currentUsername}`, JSON.stringify(chatSessions)); 
            } catch (e) {
                console.error("Storage save failed.", e);
            }
        }
        
        function toggleSendBtn() {
            const input = document.getElementById("user-input").value.trim();
            const btn = document.getElementById("send-button");
            if (input.length > 0 || attachedImageBase64 !== "") btn.classList.add("active");
            else btn.classList.remove("active");
        }
        function triggerFileSelect() { document.getElementById("file-input").click(); }

        function handleFileAttachment() {
            const fileBox = document.getElementById("file-input");
            if (fileBox.files.length === 0) return;
            const file = fileBox.files[0];
            attachedImageMimeType = file.type;
            const reader = new FileReader();
            reader.onload = function(e) {
                attachedImageBase64 = e.target.result.split(",")[1];
                document.getElementById("img-display-preview").src = e.target.result;
                document.getElementById("preview-shelf").style.display = "block";
                toggleSendBtn();
            };
            reader.readAsDataURL(file);
        }

        function clearAttachedImage() {
            attachedImageBase64 = ""; attachedImageMimeType = "";
            document.getElementById("file-input").value = "";
            document.getElementById("preview-shelf").style.display = "none";
            toggleSendBtn();
        }

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            recognition.onresult = function(event) {
                document.getElementById("user-input").value = event.results[0][0].transcript;
                toggleSendBtn();
                stopListeningMode();
            };
            recognition.onerror = () => stopListeningMode();
            recognition.onend = () => stopListeningMode();
        }

        function toggleVoiceRecognition() {
            if (!recognition) {
                triggerToast("Voice recognition is unsupported on this browser.");
                return;
            }
            if (isListening) { recognition.stop(); stopListeningMode(); }
            else {
                navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
                    visualizerState = "listening";
                    recognition.start();
                    isListening = true;
                    document.getElementById("mic-button").classList.add("listening");
                }).catch(() => {
                    triggerToast("Microphone permissions denied.");
                });
            }
        }
        function stopListeningMode() { 
            isListening = false; 
            visualizerState = "idle";
            document.getElementById("mic-button").classList.remove("listening"); 
        }

        function toggleSandboxPanel() { document.getElementById("sandbox-panel").classList.toggle("hidden"); }
        
        function runInSandbox(encodedCode) {
            const dynamicHTML = decodeURIComponent(escape(atob(encodedCode)));
            const iframe = document.getElementById("sandbox-preview");
            document.getElementById("sandbox-panel").classList.remove("hidden");
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open(); doc.write(dynamicHTML); doc.close();
        }

        function clearSandbox() {
            const iframe = document.getElementById("sandbox-preview");
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(`<html><body style="font-family:sans-serif; color:#666; display:flex; justify-content:center; align-items:center; height:90vh;"><div>Click "Render Live" to load code frames.</div></body></html>`);
            doc.close();
        }

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const text = inputField.value.trim();
            if (!text && !attachedImageBase64) return;
            if (!GEMINI_API_KEY) {
                triggerToast("Setup your profile username & key first!");
                return;
            }

            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }

            const win = document.getElementById("chat-window");
            const userRow = document.createElement("div");
            userRow.className = "msg-row";
            const inlineImgHTML = attachedImageBase64 ? `<br><img src="data:${attachedImageMimeType};base64,${attachedImageBase64}">` : "";
            userRow.innerHTML = `<div class="avatar" style="color:var(--text-primary);">YOU</div><div class="bubble-text">${text}${inlineImgHTML}</div>`;
            win.appendChild(userRow);

            chatSessions[activeSessionId].history.push({ 
                role: "user", text: text, imgData: attachedImageBase64, imgType: attachedImageMimeType
            });

            if (chatSessions[activeSessionId].title === "New Workspace Chat") {
                chatSessions[activeSessionId].title = text ? text.substring(0, 22) + "..." : "Image Data Log";
            }

            const currentMsgText = text || "Analyze attachment data.";
            let requestParts = [{ text: currentMsgText }];
            if (attachedImageBase64) {
                requestParts.push({ inlineData: { mimeType: attachedImageMimeType, data: attachedImageBase64 } });
            }

            clearAttachedImage();
            inputField.value = "";
            toggleSendBtn();
            win.scrollTop = win.scrollHeight;

            const aiRow = document.createElement("div");
            aiRow.className = "msg-row";
            aiRow.innerHTML = `<div class="avatar">SYSTEM</div><div class="bubble-text" id="loader">Processing Request...</div>`;
            win.appendChild(aiRow);
            win.scrollTop = win.scrollHeight;

            const startTime = performance.now();
            document.getElementById("status-clock").innerText = "⏳ COMPUTING...";
            visualizerState = "computing";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: requestParts }] })
                });

                const data = await res.json();
                const outputText = data.candidates[0].content.parts[0].text;
                
                const endTime = performance.now();
                const latency = Math.round(endTime - startTime);
                document.getElementById("status-clock").innerText = `⚡ ENGINE READY (${latency}ms)`;
                visualizerState = "idle";

                // Save model message first to secure the index reference
                chatSessions[activeSessionId].history.push({ role: "model", text: outputText });
                const currentMsgIndex = chatSessions[activeSessionId].history.length - 1;

                const loaderEl = document.getElementById("loader");
                loaderEl.innerHTML = `
                    ${formatMarkdownText(outputText)}
                    <div class="msg-actions">
                        <button class="action-icon-btn" onclick="speakMessage('${activeSessionId}', ${currentMsgIndex})">🔊 Listen</button>
                    </div>`;
                loaderEl.removeAttribute("id");

                addXP(Math.floor(Math.random() * 15) + 15);
            } catch (err) {
                document.getElementById("loader").innerText = "Core processor connection issue. Verify your active API key entry.";
                document.getElementById("loader").removeAttribute("id");
                document.getElementById("status-clock").innerText = "❌ ENGINE ERROR";
                visualizerState = "idle";
            }
            
            saveSessionsToStorage();
            renderRecentChats();
            win.scrollTop = win.scrollHeight;
        }
    </script>
</body>
